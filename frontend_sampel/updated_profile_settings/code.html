<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#ec5b13",
                "background-light": "#f8f6f6",
                "background-dark": "#221610",
              },
              fontFamily: {
                "display": ["Public Sans"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen bg-background-light dark:bg-background-dark shadow-xl">
<!-- Header -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-4 flex items-center justify-between border-b border-primary/10">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-primary/10 text-slate-700 dark:text-slate-300">
<span class="material-icons">arrow_back</span>
</button>
<h1 class="text-xl font-semibold">Settings</h1>
</div>
<button class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary/20">
<img alt="Profile photo" class="w-full h-full object-cover" data-alt="Portrait of a smiling professional man" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAEWJN88ZASlzlM58uDdX4b9aIOt-41OyLemcMsG-asluUkvEld8Q8X_7adKYQ6YhBm5r7ofijAlJcYahGA1V-ON3caZ6lFeqZ9IpHqTyHA8EOQCSo5Nw7vtXtsZOy4TOiKEt0y0U5X3LSixhxAI3Xz8BxWBLmOTRAqxOxxZDwTeQQppLfGlTypHViYgOgbCHuD0PoVdUZgfzycn-JZvnVHzfhPb3_Icbm7ufJwPlnXm8yET-zj1acPoZqrfhJCvA74NxXR12kGEUh3"/>
</button>
</header>
<main class="p-6 space-y-8 pb-24">
<!-- Account Section -->
<section>
<h2 class="text-xs font-bold uppercase tracking-wider text-primary mb-4">Account Information</h2>
<div class="space-y-4">
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-900/40 rounded-xl border border-primary/5 shadow-sm">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons">person</span>
</div>
<div>
<p class="text-sm font-medium">Alex Thompson</p>
<p class="text-xs text-slate-500">alex.t@example.com</p>
</div>
</div>
<span class="material-icons text-slate-400 text-sm">chevron_right</span>
</div>
<a class="flex items-center justify-between p-4 bg-white dark:bg-slate-900/40 rounded-xl border border-primary/5 shadow-sm hover:border-primary/30 transition-colors" href="#">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons">lock</span>
</div>
<p class="text-sm font-medium">Change Password</p>
</div>
<span class="material-icons text-slate-400 text-sm">chevron_right</span>
</a>
</div>
</section>
<!-- Preferences Section -->
<section>
<h2 class="text-xs font-bold uppercase tracking-wider text-primary mb-4">Preferences</h2>
<div class="bg-white dark:bg-slate-900/40 rounded-xl border border-primary/5 shadow-sm divide-y divide-primary/5">
<!-- Theme Toggle -->
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons">dark_mode</span>
</div>
<span class="text-sm font-medium">Dark Mode</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Language Dropdown -->
<div class="p-4">
<div class="flex flex-col gap-2">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons">language</span>
</div>
<div class="flex-1">
<label class="text-sm font-medium block" for="language">Language</label>
<select class="w-full mt-1 bg-transparent border-none p-0 text-sm text-slate-500 focus:ring-0 cursor-pointer" id="language">
<option>English (US)</option>
<option>Spanish (ES)</option>
<option>French (FR)</option>
<option>German (DE)</option>
</select>
</div>
</div>
</div>
</div>
<!-- Timezone Dropdown -->
<div class="p-4">
<div class="flex flex-col gap-2">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons">schedule</span>
</div>
<div class="flex-1">
<label class="text-sm font-medium block" for="timezone">Time Zone</label>
<select class="w-full mt-1 bg-transparent border-none p-0 text-sm text-slate-500 focus:ring-0 cursor-pointer" id="timezone">
<option>(GMT-08:00) Pacific Time</option>
<option>(GMT+00:00) UTC</option>
<option>(GMT+01:00) Central European</option>
<option>(GMT+08:00) Singapore Standard</option>
</select>
</div>
</div>
</div>
</div>
</div>
</section>
<!-- Notifications Section -->
<section>
<h2 class="text-xs font-bold uppercase tracking-wider text-primary mb-4">Notifications</h2>
<div class="bg-white dark:bg-slate-900/40 rounded-xl border border-primary/5 shadow-sm divide-y divide-primary/5">
<!-- Email Alerts -->
<div class="flex items-center justify-between p-4"><div class="flex items-center gap-4 w-full">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary shrink-0">
<span class="material-icons">mail</span>
</div>
<div class="flex-1">
<label class="text-sm font-medium block" for="email-input">Email Alerts</label>
<input class="w-full mt-1 bg-transparent border-none p-0 text-sm text-slate-500 focus:ring-0 cursor-pointer" id="email-input" placeholder="alex.t@example.com" type="email"/>
</div>
</div></div>
<!-- Telegram Alerts -->
<div class="flex items-center justify-between p-4"><div class="flex items-center gap-4 w-full">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary shrink-0">
<span class="material-icons">send</span>
</div>
<div class="flex-1">
<label class="text-sm font-medium block" for="telegram-input">Telegram Alerts</label>
<input class="w-full mt-1 bg-transparent border-none p-0 text-sm text-slate-500 focus:ring-0 cursor-pointer" id="telegram-input" placeholder="@alext_handle" type="text"/>
</div>
</div></div>
</div><div class="mt-4">
<button class="w-full py-3 px-6 bg-primary/10 text-primary font-semibold rounded-xl flex items-center justify-center gap-2 hover:bg-primary/20 active:scale-[0.98] transition-all border border-primary/20">
<span class="material-icons text-sm">save</span>
<span class="text-sm">Save Notification Settings</span>
</button>
</div>
</section>
<!-- Action Area -->
<div class="pt-4">
<button class="w-full py-4 px-6 bg-primary text-white font-semibold rounded-xl flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-primary/20">
<span class="material-icons">logout</span>
                    Log Out
                </button>
<p class="text-center text-[10px] text-slate-400 mt-6 font-medium">App Version 2.4.1 (Build 8902)</p>
</div>
</main>
<!-- Navigation Bar -->
<nav class="fixed bottom-0 w-full max-w-md bg-white dark:bg-slate-900 border-t border-primary/10 px-6 py-3 flex justify-between items-center z-20">
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-icons">home</span>
<span class="text-[10px]">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-icons">dashboard</span>
<span class="text-[10px]">Stats</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-icons">notifications</span>
<span class="text-[10px]">Alerts</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-icons">settings</span>
<span class="text-[10px]">Settings</span>
</button>
</nav>
</div>
</body></html>
